<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { width: 128px; height: 128px; overflow: hidden; }
  .icon {
    width: 128px; height: 128px;
    background: linear-gradient(145deg, #1a1a2e 0%, #0f0f23 100%);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .icon::before {
    content: "";
    position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(13,153,255,0.3) 0%, transparent 70%);
  }
  .icon::after {
    content: "";
    position: absolute;
    bottom: -10px; left: -10px;
    width: 60px; height: 60px;
    background: radial-gradient(circle, rgba(74,222,128,0.2) 0%, transparent 70%);
  }
  svg { position: relative; z-index: 1; }
</style>
</head>
<body>
  <div class="icon">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <!-- Broken chain link (left) -->
      <rect x="8" y="20" width="24" height="32" rx="8" stroke="#4a5568" stroke-width="3" fill="none" opacity="0.4"/>
      <!-- Arrow / rebind indicator -->
      <path d="M34 36 L44 36" stroke="#0d99ff" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 31 L45 36 L40 41" stroke="#0d99ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Connected chain link (right) - bright -->
      <rect x="40" y="20" width="24" height="32" rx="8" stroke="#0d99ff" stroke-width="3" fill="none"/>
      <!-- Variable dot (bound) -->
      <circle cx="52" cy="36" r="4" fill="#4ade80"/>
      <!-- Small token dots on left (unbound) -->
      <circle cx="20" cy="32" r="2.5" fill="#4a5568" opacity="0.5"/>
      <circle cx="20" cy="40" r="2.5" fill="#4a5568" opacity="0.5"/>
    </svg>
  </div>
</body>
</html>
